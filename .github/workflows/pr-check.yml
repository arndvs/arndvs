name: PR Check

on:
    pull_request:
        branches: [main, dev]
    push:
        branches: [main, dev]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - name: Typecheck
              run: pnpm typecheck

            - name: Lint
              run: pnpm lint

            - name: Test
              run: pnpm test

            - name: Format check
              run: pnpm format:check

            - name: Debug env vars
              run: |
                  echo "SANITY_API_VERSION is set: ${{ vars.NEXT_PUBLIC_SANITY_API_VERSION != '' }}"
                  echo "SANITY_PROJECT_ID is set: ${{ vars.NEXT_PUBLIC_SANITY_PROJECT_ID != '' }}"
                  echo "SANITY_DATASET is set: ${{ vars.NEXT_PUBLIC_SANITY_DATASET != '' }}"
                  echo "SITE_URL is set: ${{ vars.NEXT_PUBLIC_SITE_URL != '' }}"

            - name: Build
              run: pnpm build
              env:
                  NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ vars.NEXT_PUBLIC_SANITY_PROJECT_ID }}
                  NEXT_PUBLIC_SANITY_DATASET: ${{ vars.NEXT_PUBLIC_SANITY_DATASET }}
                  NEXT_PUBLIC_SANITY_API_VERSION: ${{ vars.NEXT_PUBLIC_SANITY_API_VERSION }}
                  NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
